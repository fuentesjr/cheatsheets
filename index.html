<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <style>
    :root { color-scheme: light dark; }

    h1 { font-size: 1.6rem; margin-bottom: .25rem; }
    .tagline { color: #6b7280; margin-top: 0; }
    .count { color: #6b7280; font-size: .9rem; border-bottom: 1px solid #8884; padding-bottom: .5rem; }
    ul { list-style: none; padding: 0; }
    li { margin: .25rem 0; }
    a { color: #2563eb; text-decoration: none; }
    ul a { font-size: 1.1rem; }
    a:hover { text-decoration: underline; }
    .empty { color: #6b7280; }
    footer { margin-top: 2.5rem; padding-top: 1rem; border-top: 1px solid #8884; color: #6b7280; font-size: .9rem; }
    @media (prefers-color-scheme: dark) { a { color: #60a5fa; } .tagline, .count, .empty, footer { color: #9ca3af; } }
  </style>
</head>
